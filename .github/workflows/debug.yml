name: Debug Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bridge:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bridge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: bridge/.nvmrc
          cache: npm
          cache-dependency-path: bridge/package-lock.json

      - name: Install and verify bridge
        run: |
          npm ci
          npm run check
          npm test
          npm audit --omit=dev

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # prerelease number is the distance from the base-version commit

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Test and build debug APK
        env:
          # oneui-design + SESL libs live on GitHub Packages, which requires
          # auth even for public packages (token needs read:packages).
          GH_PACKAGES_USER: ${{ secrets.GH_PACKAGES_USER }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: ./gradlew testDebugUnitTest assembleDebug lintDebug --no-daemon --stacktrace

      - name: Read debug version
        id: version
        run: |
          VERSION=$(jq -r '.elements[0].versionName' app/build/outputs/apk/debug/output-metadata.json)
          BASE=$(sed -n 's/^versionName=\(.*\)$/\1/p' version.properties)
          VERSION_COMMIT=$(git log -1 --format=%H -- version.properties)
          if [ -z "$VERSION_COMMIT" ]; then
            echo "::error::Unable to locate the base-version commit; checkout history is incomplete"
            exit 1
          fi
          NUMBER=$(($(git rev-list --count "$VERSION_COMMIT..HEAD") + 1))
          EXPECTED="$BASE-debug.$NUMBER"
          if [ "$VERSION" != "$EXPECTED" ]; then
            echo "::error::Built APK version $VERSION does not match expected version $EXPECTED"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: twidget-v${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
